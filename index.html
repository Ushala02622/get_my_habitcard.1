<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夢想存摺 V7.5 (還債止損版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .progress-bar { transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .habit-card:active { transform: scale(0.98); }
        :root { --primary-color: #ef4444; --secondary-color: #059669; }
        .bg-primary { background-color: var(--primary-color); }
        .text-primary { color: var(--primary-color); }
        .bg-secondary { background-color: var(--secondary-color); }
        .text-secondary { color: var(--secondary-color); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24">

    <!-- 頂部面板：若是負債會呈現紅色警告 -->
    <div id="topPanel" class="sticky top-0 text-white p-6 shadow-2xl z-20 rounded-b-[2.5rem] bg-red-600">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-start">
                <div>
                    <p id="bankLabel" class="text-xs opacity-80 mb-1 font-medium tracking-widest">🚨 債務泥潭！尚需償還星星</p>
                    <div class="flex items-center">
                        <span class="text-xl mr-1 text-yellow-300 font-bold">⭐</span>
                        <h1 id="totalBank" class="text-4xl font-black tracking-tighter">-4,330</h1>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-xs opacity-80 mb-1 font-medium tracking-widest">今日努力還債</p>
                    <p id="todayPoints" class="text-2xl font-black text-yellow-300">+0</p>
                </div>
            </div>
            <div class="flex space-x-2 mt-6">
                <button onclick="settleDay()" class="flex-1 bg-white/20 hover:bg-white/30 backdrop-blur-md border border-white/40 py-3 rounded-2xl text-sm font-black transition-all active:scale-95">
                    🌙 結束今日還債任務
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto p-5 space-y-10">
        
        <!-- 📅 跨月連坐預算看板 -->
        <section class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-black text-slate-800 flex items-center">💳 預算止損追償看板 <span id="budgetMonthLabel" class="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded-md ml-2"></span></h2>
                <button onclick="toggleModal('expenseModal')" class="bg-emerald-600 text-white px-3 py-1.5 rounded-xl text-xs font-bold shadow-md hover:bg-emerald-700 transition-colors">
                    💸 記日常開銷 (免扣點)
                </button>
            </div>
            
            <!-- 娛樂預算條：會自動扣除超支 -->
            <div>
                <div class="flex justify-between text-xs font-bold mb-1">
                    <span class="text-red-600">🛍️ 娛樂購物額度 (上月超支已自動連坐扣除)</span>
                    <span id="funBudgetText" class="text-slate-500">$4,000 / $4,000</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-3">
                    <div id="funBudgetBar" class="bg-red-500 h-full rounded-full transition-all duration-500" style="width: 100%"></div>
                </div>
            </div>

            <!-- 彈性預算條 -->
            <div>
                <div class="flex justify-between text-xs font-bold mb-1">
                    <span class="text-emerald-600">🏥 醫療/必要社交 (上限 $5,663)</span>
                    <span id="saveBudgetText" class="text-slate-500">$5,663 / $5,663</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-3">
                    <div id="saveBudgetBar" class="bg-emerald-500 h-full rounded-full transition-all duration-500" style="width: 100%"></div>
                </div>
            </div>

            <button onclick="settleMonth()" class="w-full bg-slate-900 text-white py-2.5 rounded-xl text-xs font-black tracking-wide hover:bg-slate-800 transition-colors">
                🏁 月底結算 (剩餘彈性預算將強制拿去還債！)
            </button>
        </section>

        <!-- 📚 還債任務 -->
        <section>
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-2xl font-black text-slate-800">🛠️ 勞動還債區 (做任務銷債)</h2>
                <button onclick="toggleModal('habitModal')" class="bg-slate-800 text-white p-2 rounded-xl shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" /></svg>
                </button>
            </div>
            <div id="habitList" class="grid grid-cols-1 gap-3"></div>
        </section>

        <!-- 🌌 債務清單 -->
        <section>
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-2xl font-black text-slate-800">🚨 已預支債務分期中</h2>
            </div>
            <div id="rewardList" class="space-y-4"></div>
        </section>
        
        <!-- 📊 歷史紀錄 -->
        <section class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
            <h2 class="text-xl font-black text-slate-800 mb-4">📊 還款與開銷歷史</h2>
            <div id="historyList" class="space-y-2 text-sm text-slate-600 font-mono"></div>
        </section>
    </div>

    <!-- Modals -->
    <div id="expenseModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-30 flex items-center justify-center p-6">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-sm shadow-2xl">
            <h3 class="text-xl font-black mb-2 text-slate-800">💸 記一筆必要/臨時開銷</h3>
            <input id="expName" type="text" placeholder="項目 (例：🏥 看醫生)" class="w-full bg-slate-100 border-none p-4 rounded-2xl mb-3">
            <input id="expAmount" type="number" placeholder="台幣金額 ($)" class="w-full bg-slate-100 border-none p-4 rounded-2xl mb-6">
            <div class="flex space-x-3">
                <button onclick="toggleModal('expenseModal')" class="flex-1 bg-slate-200 text-slate-600 py-4 rounded-2xl font-bold">取消</button>
                <button onclick="addExpense()" class="flex-1 bg-emerald-600 text-white py-4 rounded-2xl font-bold">記帳</button>
            </div>
        </div>
    </div>

    <div id="habitModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-30 flex items-center justify-center p-6">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-sm shadow-2xl">
            <h3 class="text-xl font-black mb-4 text-slate-800">新增任務</h3>
            <input id="newHabitName" type="text" placeholder="名稱" class="w-full bg-slate-100 border-none p-4 rounded-2xl mb-3">
            <input id="newHabitPts" type="number" placeholder="點數" class="w-full bg-slate-100 border-none p-4 rounded-2xl mb-6">
            <div class="flex space-x-3">
                <button onclick="toggleModal('habitModal')" class="flex-1 bg-slate-200 text-slate-600 py-4 rounded-2xl font-bold">取消</button>
                <button onclick="addItem()" class="flex-1 bg-slate-800 text-white py-4 rounded-2xl font-bold">添加</button>
            </div>
        </div>
    </div>

    <script>
        let currentMonthKey = new Date().getFullYear() + '-' + (new Date().getMonth() + 1);

        // 如果是全新載入或要強制鎖死債務，初始化設定
        let localData = JSON.parse(localStorage.getItem('habitProDataV7'));
        
        // 🚨 核心鎖定：如果初次使用此版本，直接把四件套上架並扣成負分
        if (!localData || !localData.hasDebtLocked) {
            localData = {
                totalBank: -4330, // 450 + 1200 + 1280 + 1400 = 4330 負債開局！
                todayPoints: 0,
                themeColor: '#ef4444',
                currentMonth: currentMonthKey,
                funBudgetUsed: 4330, // 娛樂額度本月直接打爆超支 $330
                saveBudgetUsed: 0,
                hasDebtLocked: true, // 鎖定標記，防重複扣除
                history: [{ date: '🚨 系統債務鎖定', pts: '-4330 ⭐ (透支香水、水壺、耳環、衣服)' }],
                habits: [
                    { name: '💧 喝水 2000 CC', pts: 10 },
                    { name: '🧘 瑜珈 30 mins', pts: 20 },
                    { name: '🌙 12 點前睡覺', pts: 30 },
                    { name: '🏃‍♂️ 慢跑 5 KM', pts: 50 },
                    { name: '🗣️ 英文口說 30 mins', pts: 25 },
                    { name: '📖 多益錯題解析', pts: 25 },
                    { name: '📝 寫一份多益模擬試題', pts: 60 },
                    { name: '💡 研究創業/副業', pts: 25 },
                    { name: '🎬 剪輯影片/研究相機', pts: 40 }
                ],
                rewards: [
                    { name: '🛍️ 奢華香水', pts: 450, exchanged: true },
                    { name: '🥛 Owala 質感水壺', pts: 1200, exchanged: true },
                    { name: '👂 🤝 質感耳環', pts: 1280, exchanged: true },
                    { name: '👗 漂亮衣服', pts: 1400, exchanged: true },
                    { name: '👑 EXO 演唱會門票 (未解鎖)', pts: 4190, exchanged: false }
                ]
            };
        }

        let data = localData;

        // 跨月追償連坐邏輯
        if (data.currentMonth !== currentMonthKey) {
            // 計算上個月娛樂超支了多少錢 (超過 4000 的部分)
            let debtOver = Math.max(0, data.funBudgetUsed - 4000); 
            data.currentMonth = currentMonthKey;
            data.saveBudgetUsed = 0;
            // 下個月的初始使用量 = 上月超支。也就是說下月一開始可用額度就變少了！
            data.funBudgetUsed = debtOver; 
            data.history.push({ date: `🚨 跨月超支追償 (${currentMonthKey})`, pts: `下月娛樂額度扣除 $${debtOver}` });
        }

        function saveData() {
            localStorage.setItem('habitProDataV7', JSON.stringify(data));
            render();
        }

        function render() {
            document.getElementById('totalBank').innerText = data.totalBank.toLocaleString();
            document.getElementById('todayPoints').innerText = `+${data.todayPoints}`;
            document.getElementById('budgetMonthLabel').innerText = data.currentMonth;

            // 娛樂預算：上限 $4,000，超支會顯示負數或歸零
            const funLeft = 4000 - data.funBudgetUsed;
            document.getElementById('funBudgetText').innerText = `$${funLeft.toLocaleString()} / $4,000`;
            document.getElementById('funBudgetBar').style.width = `${Math.max(0, Math.min(100, (funLeft / 4000) * 100))}%`;
            
            // 變色警告
            if (data.totalBank < 0) {
                document.getElementById('topPanel').className = "sticky top-0 text-white p-6 shadow-2xl z-20 rounded-b-[2.5rem] bg-red-600 animate-pulse";
                document.getElementById('bankLabel').innerText = "🚨 債務泥潭！尚需償還星星";
            } else {
                document.getElementById('topPanel').className = "sticky top-0 text-white p-6 shadow-2xl z-20 rounded-b-[2.5rem] bg-emerald-600";
                document.getElementById('bankLabel').innerText = "⭐ 債務結清！可用娛樂星星";
            }

            const saveLeft = Math.max(0, 5663 - data.saveBudgetUsed);
            document.getElementById('saveBudgetText').innerText = `$${saveLeft.toLocaleString()} / $5,663`;
            document.getElementById('saveBudgetBar').style.width = `${(saveLeft / 5663) * 100}%`;

            // 任務清單
            const hList = document.getElementById('habitList');
            hList.innerHTML = data.habits.map((h, i) => `
                <div class="flex items-center space-x-2">
                    <div onclick="addDailyPoints(${h.pts})" class="habit-card flex-1 flex justify-between items-center bg-white p-5 rounded-[1.5rem] shadow-sm border-b-4 border-slate-200 active:border-b-0 transition-all cursor-pointer">
                        <span class="font-bold text-slate-700">${h.name}</span>
                        <span class="font-black text-red-500 tracking-tighter">還債 +${h.pts}</span>
                    </div>
                    <button onclick="deleteItem('habit', ${i})" class="bg-slate-200 text-slate-400 p-4 rounded-2xl text-sm">✕</button>
                </div>
            `).join('');

            // 商店與債務
            const rList = document.getElementById('rewardList');
            rList.innerHTML = data.rewards.map((r, i) => {
                if (r.exchanged) {
                    return `
                        <div class="bg-red-50 border border-red-200 p-5 rounded-[2rem] flex justify-between items-center opacity-70">
                            <div>
                                <span class="font-black text-red-800 text-base block">💸 已提前透支：${r.name}</span>
                                <span class="text-xs text-red-500 font-bold">代價：-${r.pts} 星星 </span>
                            </div>
                            <span class="bg-red-200 text-red-800 text-xs px-3 py-1 rounded-xl font-black">扣還中</span>
                        </div>
                    `;
                } else {
                    const isReady = data.totalBank >= r.pts && data.totalBank > 0;
                    return `
                        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                            <div class="flex justify-between items-center">
                                <span class="font-black text-slate-800 text-lg block">${r.name}</span>
                                <span class="text-xs font-bold text-slate-400">${r.pts} ⭐</span>
                            </div>
                            ${isReady ? `
                                <button onclick="exchange(${i})" class="w-full mt-4 bg-emerald-600 text-white py-3 rounded-2xl font-black">🎁 兌換</button>
                            ` : `<button class="w-full mt-4 bg-slate-100 text-slate-400 py-3 rounded-2xl text-xs font-bold cursor-not-allowed" disabled>❌ 星星為負數或不足，無法解鎖</button>`}
                        </div>
                    `;
                }
            }).join('');

            const histList = document.getElementById('historyList');
            histList.innerHTML = data.history.slice(-10).reverse().map(h => `
                <div class="flex justify-between border-b border-slate-100 py-1">
                    <span>${h.date}</span>
                    <span class="font-bold ${h.pts.toString().includes('-') ? 'text-red-500' : 'text-slate-800'}">${h.pts}</span>
                </div>
            `).join('');
        }

        function addDailyPoints(pts) { data.todayPoints += pts; saveData(); }

        function settleDay() {
            if(data.todayPoints === 0) return alert("今天還沒賺取任何還債點數喔！");
            data.totalBank += data.todayPoints;
            data.history.push({ date: '🛠️ 還債：' + new Date().toLocaleDateString(), pts: `+${data.todayPoints} ⭐` });
            data.todayPoints = 0;
            saveData();
        }

        function addExpense() {
            const name = document.getElementById('expName').value;
            const amount = parseInt(document.getElementById('expAmount').value);
            if(!name || !amount) return alert("請輸入完整資訊");
            data.saveBudgetUsed += amount;
            data.history.push({ date: `💸 日常：${name}`, pts: `-$${amount}` });
            document.getElementById('expName').value = ''; document.getElementById('expAmount').value = '';
            toggleModal('expenseModal'); saveData();
        }

        // 月底結算：如果這時候彈性儲蓄有剩，強制全部拿去填補星星債務！
        function settleMonth() {
            const saveLeft = 5663 - data.saveBudgetUsed;
            if(saveLeft <= 0) return alert("本月沒有剩餘彈性預算可以還債。");
            
            if(confirm(`🏁 確定結算本月？\n剩餘的 $${saveLeft} 彈性預算將強制注入，幫你抵銷債務！`)) {
                data.totalBank += saveLeft;
                data.history.push({ date: `🏁 月底預算強制還債 (${data.currentMonth})`, pts: `+${saveLeft} ⭐` });
                data.saveBudgetUsed = 5663; 
                saveData();
                alert(`成功用省下來的預算償還了 ${saveLeft} 點債務！`);
            }
        }

        function exchange(index) {
            const reward = data.rewards[index];
            if (data.totalBank < reward.pts) return alert("星星不夠！");
            data.totalBank -= reward.pts;
            data.funBudgetUsed += reward.pts;
            reward.exchanged = true;
            saveData();
        }

        function addItem() {
            const name = document.getElementById('newHabitName').value;
            const pts = parseInt(document.getElementById('newHabitPts').value);
            if(!name || !pts) return;
            data.habits.push({ name, pts });
            toggleModal('habitModal'); saveData();
        }

        function deleteItem(type, index) {
            data[type === 'habit' ? 'habits' : 'rewards'].splice(index, 1);
            saveData();
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

        saveData();
    </script>
</body>
</html>
